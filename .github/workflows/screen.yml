name: Daglig screening

# Konvergensscreenern: poängsätter hela universum mot de sju signalerna
# (REGELVERK.md §2) och skriver data/screen.json. Vardagar 04:30 UTC —
# efter US-stängning, före svensk börsöppning. Udda minut av samma skäl
# som update.yml (GitHubs schemaläggare tappar högtrafikslots).

on:
  schedule:
    - cron: "23 4 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daglig-screening
  cancel-in-progress: false

jobs:
  screena:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Hämta koden
        uses: actions/checkout@v5

      - name: Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Kör screenern
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scripts/screen_data.py

      - name: Committa vid förändring
        run: |
          git config user.name "stockpit-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash
          git add data/screen.json data/screen_state.json
          if git diff --cached --quiet; then
            echo "Ingen förändring — ingen commit."
          else
            git commit -m "data: daglig screening $(date -u +'%Y-%m-%d')"
            git push
          fi
